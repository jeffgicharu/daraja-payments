apiVersion: apps/v1
kind: Deployment
metadata:
  name: daraja-payments
  namespace: daraja
spec:
  replicas: 1
  selector:
    matchLabels:
      app: daraja-payments
  template:
    metadata:
      labels:
        app: daraja-payments
    spec:
      # Kubernetes injects <SERVICE>_PORT=tcp://ip:port for every Service in the
      # namespace; the mysql Service's MYSQL_PORT would clobber our config env var.
      enableServiceLinks: false
      containers:
        - name: app
          image: ghcr.io/jeffgicharu/daraja-payments:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: MYSQL_HOST
              value: mysql
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka.daraja.svc.cluster.local:9092
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef: {name: daraja-secrets, key: mysql-user}
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef: {name: daraja-secrets, key: mysql-password}
            - name: DARAJA_CONSUMER_KEY
              valueFrom:
                secretKeyRef: {name: daraja-secrets, key: daraja-consumer-key}
            - name: DARAJA_CONSUMER_SECRET
              valueFrom:
                secretKeyRef: {name: daraja-secrets, key: daraja-consumer-secret}
            - name: DARAJA_PASSKEY
              valueFrom:
                secretKeyRef: {name: daraja-secrets, key: daraja-passkey}
            - name: DARAJA_CALLBACK_BASE_URL
              valueFrom:
                secretKeyRef: {name: daraja-secrets, key: daraja-callback-base-url}
            - name: API_JWT_SECRET
              valueFrom:
                secretKeyRef: {name: daraja-secrets, key: api-jwt-secret}
            - name: API_CLIENT_ID
              valueFrom:
                secretKeyRef: {name: daraja-secrets, key: api-client-id}
            - name: API_CLIENT_SECRET
              valueFrom:
                secretKeyRef: {name: daraja-secrets, key: api-client-secret}
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: daraja-payments
  namespace: daraja
spec:
  selector:
    app: daraja-payments
  ports:
    - port: 80
      targetPort: 8080
